name: Deploy homepage to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: homepage-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: https://date.suaveforge.com
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/homepage/static

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
